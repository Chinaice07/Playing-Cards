<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
<link rel="stylesheet" type="text/css" href="assets/css/styles.css" media="all" />
<link rel="icon" type="image/png" href="assets/images/Playing_Cards_Favicon.png" />
</head>

<body>
<main id="playing-cards">
	<div class="card">
		<div class="left">10<br>♠</div>
		<div class="middle">♠</div>
		<div class="right">♠ <br>10</div>
	</div>
	<div class="card">
		<div class="left">9<br>♣</div>
		<div class="middle">♣</div>
		<div class="right">♣<br>9</div>
	</div>
	<div class="card">
		<div class="left">A<br>♥</div>
		<div class="middle">♥</div>
		<div class="right">♥<br>A</div>
	</div>
  <div class="card">
		<div class="left">3<br>♦</div>
		<div class="middle">♦</div>
		<div class="right">♦<br>3</div>
	</div>
</main>
</body>

</html>
